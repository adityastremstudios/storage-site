services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: uetms
      POSTGRES_PASSWORD: uetms
      POSTGRES_DB: uetms
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uetms"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://uetms:uetms@postgres:5432/uetms
      REDIS_URL: redis://redis:6379
      PORT: 4000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-change-me-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret}
      SEED: ${SEED:-true}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@uetms.local}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123}
    volumes:
      - uploads:/app/server/uploads
      - ./server/backup:/app/server/backup
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
