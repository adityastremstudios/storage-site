<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>UETMS — Live Tournament Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --bg:#0B0E14; --panel:#131824; --panel2:#1A2130; --line:rgba(255,255,255,.08); --ink:#F4F6FB; --dim:#98A2B6; --accent:#F0B429; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--ink); font-family:Inter,system-ui,sans-serif; min-height:100vh; }
.disp { font-family:'Barlow Condensed',sans-serif; text-transform:uppercase; letter-spacing:.03em; }
a { color:inherit; }
header { border-bottom:1px solid var(--line); padding:0 clamp(16px,4vw,48px); height:64px; display:flex; align-items:center; gap:14px; position:sticky; top:0; background:color-mix(in srgb, var(--bg) 88%, transparent); backdrop-filter:blur(8px); z-index:5; }
.mark { width:30px; height:30px; background:linear-gradient(135deg,var(--accent),#c47f0a); clip-path:polygon(50% 0,100% 28%,100% 72%,50% 100%,0 72%,0 28%); }
header h1 { font-size:24px; }
header .adm { margin-left:auto; font-size:13px; color:var(--dim); text-decoration:none; border:1px solid var(--line); padding:7px 14px; border-radius:6px; }
header .adm:hover { border-color:var(--accent); color:var(--ink); }
.wrap { max-width:1160px; margin:0 auto; padding:clamp(16px,4vw,40px); }
.hero { display:flex; align-items:end; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:22px; }
.hero h2 { font-size:clamp(34px,5vw,54px); line-height:.95; }
.hero .sub { color:var(--dim); margin-top:8px; font-size:15px; }
.live-dot { display:inline-flex; align-items:center; gap:8px; color:var(--accent); font-weight:700; font-size:14px; }
.live-dot i { width:9px; height:9px; border-radius:50%; background:var(--accent); animation:pulse 1.4s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }
select { background:var(--panel2); border:1px solid var(--line); color:var(--ink); padding:10px 14px; border-radius:8px; font-size:15px; font-family:inherit; }
.tabs { display:flex; gap:4px; border-bottom:1px solid var(--line); margin:26px 0 20px; overflow-x:auto; }
.tabs button { background:none; border:none; color:var(--dim); font-family:'Barlow Condensed'; text-transform:uppercase; font-size:19px; letter-spacing:.05em; padding:10px 16px; cursor:pointer; border-bottom:3px solid transparent; white-space:nowrap; }
.tabs button.on { color:var(--ink); border-bottom-color:var(--accent); }
.toolbar { display:flex; gap:10px; align-items:center; margin-bottom:14px; flex-wrap:wrap; }
.toolbar .exp { margin-left:auto; display:flex; gap:8px; }
.toolbar .exp a { font-size:12.5px; color:var(--dim); border:1px solid var(--line); padding:6px 11px; border-radius:6px; text-decoration:none; }
.toolbar .exp a:hover { border-color:var(--accent); color:var(--ink); }
.card { background:var(--panel); border:1px solid var(--line); border-radius:10px; overflow:hidden; }
table { width:100%; border-collapse:collapse; }
th { font-family:'Barlow Condensed'; text-transform:uppercase; font-size:14.5px; letter-spacing:.08em; color:var(--dim); text-align:right; padding:12px 14px; border-bottom:2px solid var(--accent); }
th.l, td.l { text-align:left; }
td { padding:10px 14px; text-align:right; border-bottom:1px solid var(--line); font-size:15px; font-variant-numeric:tabular-nums; }
tr:last-child td { border-bottom:none; }
tbody tr:hover { background:var(--panel2); }
td.rank { font-family:'Barlow Condensed'; color:var(--dim); font-size:17px; width:44px; }
tr.top1 td { background:linear-gradient(90deg, color-mix(in srgb, var(--accent) 16%, transparent), transparent 60%); }
td.pts { color:var(--accent); font-weight:700; }
.team { display:flex; align-items:center; gap:10px; }
.team img { width:26px; height:26px; object-fit:contain; }
.team .tag { font-weight:700; }
.team .full { color:var(--dim); font-size:13px; }
.empty { padding:40px; text-align:center; color:var(--dim); }
.cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; }
.pcard { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:16px; }
.pcard .ign { font-family:'Barlow Condensed'; text-transform:uppercase; font-size:22px; font-weight:700; }
.pcard .meta { color:var(--dim); font-size:13px; margin-top:3px; }
.mrow { cursor:pointer; }
.detail td { background:var(--bg); padding:0; }
.detail .inner { padding:14px 18px; }
.detail h4 { font-family:'Barlow Condensed'; text-transform:uppercase; letter-spacing:.06em; color:var(--dim); margin-bottom:8px; font-size:15px; }
footer { color:var(--dim); font-size:12.5px; text-align:center; padding:36px 16px; }
@media (max-width:640px){ .hide-sm { display:none; } }
</style>
</head>
<body>
<header>
  <div class="mark"></div><h1 class="disp">UETMS</h1>
  <a class="adm" href="/overlay/">Overlays</a>
  <a class="adm" href="/admin">Admin</a>
</header>
<div class="wrap">
  <div class="hero">
    <div>
      <div class="live-dot" id="liveDot" style="display:none"><i></i>LIVE</div>
      <h2 class="disp" id="tTitle">Select a tournament</h2>
      <div class="sub" id="tSub">Standings, results and player stats — updated the moment a match is published.</div>
    </div>
    <div style="display:flex;gap:10px">
      <select id="tSel"></select>
      <select id="rSel" style="display:none"></select>
    </div>
  </div>
  <div class="tabs" id="tabs" style="display:none">
    <button data-tab="standings" class="on">Standings</button>
    <button data-tab="matches">Matches</button>
    <button data-tab="fraggers">Top Fraggers</button>
    <button data-tab="teams">Teams</button>
    <button data-tab="players">Players</button>
  </div>
  <div class="toolbar" id="toolbar" style="display:none">
    <span style="color:var(--dim);font-size:13px" id="scopeNote"></span>
    <span class="exp" id="exports"></span>
  </div>
  <div id="content"><div class="empty">Loading…</div></div>
</div>
<footer>Universal Esports Tournament Management System — one platform for every esports tournament.</footer>
<script src="/socket.io/socket.io.js"></script>
<script>
const $ = (s) => document.querySelector(s);
let slug = null; let tab = 'standings'; let round = ''; let socket = null;
const api = (p) => fetch(`/api/public${p}`).then((r) => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });
const teamCell = (t) => `<span class="team">${t.logoUrl ? `<img src="${t.logoUrl}" alt="">` : ''}<span><span class="tag">${t.shortName || t.name}</span> <span class="full hide-sm">${t.shortName ? t.name : ''}</span></span></span>`;

async function boot() {
  const d = await api('/tournaments');
  const sel = $('#tSel');
  sel.innerHTML = d.items.map((t) => `<option value="${t.slug}">${t.name}</option>`).join('') || '<option>No tournaments yet</option>';
  sel.onchange = () => selectTournament(sel.value);
  if (d.items.length) selectTournament(new URLSearchParams(location.search).get('t') || d.items[0].slug);
  else $('#content').innerHTML = '<div class="card"><div class="empty">No tournaments yet — create one in the admin panel.</div></div>';
}

async function selectTournament(s) {
  slug = s; round = '';
  $('#tSel').value = s;
  history.replaceState(null, '', `?t=${s}`);
  const t = await api(`/t/${s}`);
  $('#tTitle').textContent = t.name;
  $('#tSub').textContent = `${t.game?.name || ''}${t.organizer ? ' · ' + t.organizer : ''}${t.prizePool ? ' · ' + t.prizePool : ''}`;
  $('#liveDot').style.display = t.status === 'LIVE' ? 'inline-flex' : 'none';
  const rSel = $('#rSel');
  rSel.innerHTML = '<option value="">All rounds</option>' + (t.rounds || []).map((r) => `<option value="${r.id}">${r.name}</option>`).join('');
  rSel.style.display = (t.rounds || []).length ? '' : 'none';
  rSel.onchange = () => { round = rSel.value; render(); };
  $('#tabs').style.display = 'flex';
  $('#toolbar').style.display = 'flex';
  if (socket) { try { socket.emit('join', slug); } catch (e) {} }
  render();
}

document.getElementById('tabs').addEventListener('click', (e) => {
  const b = e.target.closest('button'); if (!b) return;
  document.querySelectorAll('.tabs button').forEach((x) => x.classList.remove('on'));
  b.classList.add('on'); tab = b.dataset.tab; render();
});

async function render() {
  const c = $('#content');
  c.innerHTML = '<div class="card"><div class="empty">Loading…</div></div>';
  const rq = round ? `?round=${round}` : '';
  $('#scopeNote').textContent = round ? 'Showing selected round only' : 'Showing all published matches';
  $('#exports').innerHTML = `<a href="/api/reports/${slug}/overall?format=csv${round ? '&round=' + round : ''}">CSV · Standings</a><a href="/api/reports/${slug}/topfraggers?format=csv">CSV · Fraggers</a><a href="/api/reports/${slug}/matches?format=csv">CSV · Matches</a>`;
  try {
    if (tab === 'standings') {
      const d = await api(`/t/${slug}/overall${rq}`);
      c.innerHTML = `<div class="card"><table><thead><tr><th>#</th><th class="l">Team</th><th>M</th><th class="hide-sm">WWCD</th><th class="hide-sm">Place</th><th>Elims</th><th>Total</th></tr></thead><tbody>` +
        (d.items.map((r) => `<tr class="${r.rank === 1 ? 'top1' : ''}"><td class="rank">${r.rank}</td><td class="l">${teamCell(r.team)}</td><td>${r.matchesPlayed}</td><td class="hide-sm">${r.wwcd}</td><td class="hide-sm">${r.placementPoints}</td><td>${r.totalKills}</td><td class="pts">${r.totalPoints}</td></tr>`).join('') || '<tr><td colspan="7" class="empty">No published matches yet</td></tr>') +
        '</tbody></table></div>';
    } else if (tab === 'fraggers') {
      const d = await api(`/t/${slug}/topfraggers?limit=20${round ? '&round=' + round : ''}`);
      c.innerHTML = `<div class="card"><table><thead><tr><th>#</th><th class="l">Player</th><th class="l hide-sm">Team</th><th>M</th><th>Elims</th><th class="hide-sm">Damage</th><th>Avg Elims</th></tr></thead><tbody>` +
        (d.items.map((f) => `<tr><td class="rank">${f.rank}</td><td class="l"><b>${f.player.ign}</b></td><td class="l hide-sm">${f.player.currentTeam?.name || '—'}</td><td>${f.matches}</td><td class="pts">${f.kills}</td><td class="hide-sm">${f.damage}</td><td>${f.avgKills}</td></tr>`).join('') || '<tr><td colspan="7" class="empty">No data yet</td></tr>') +
        '</tbody></table></div>';
    } else if (tab === 'matches') {
      const d = await api(`/t/${slug}/matches${rq}`);
      c.innerHTML = `<div class="card"><table><thead><tr><th class="l">Round</th><th>Match</th><th class="l hide-sm">Map</th><th class="l">Winner</th><th class="hide-sm">Status</th></tr></thead><tbody>` +
        (d.items.map((m) => `<tr class="mrow" data-id="${m.id}"><td class="l">${m.round?.name || ''}</td><td>#${m.matchNumber}</td><td class="l hide-sm">${m.map?.name || '—'}</td><td class="l">${m.winnerTeam ? teamCell(m.winnerTeam) : '—'}</td><td class="hide-sm">${m.status}</td></tr>`).join('') || '<tr><td colspan="5" class="empty">No matches yet</td></tr>') +
        '</tbody></table></div>';
      c.querySelectorAll('.mrow').forEach((row) => { row.onclick = () => toggleMatch(row); });
    } else if (tab === 'teams') {
      const d = await api(`/t/${slug}/teams`);
      c.innerHTML = `<div class="cards">${d.items.map((e) => `<div class="pcard"><div class="ign">${e.team.name}</div><div class="meta">${e.team.shortName || ''}${e.team.country ? ' · ' + e.team.country : ''}</div><div class="meta" style="margin-top:8px">${(e.team.currentPlayers || []).map((p) => p.ign).join(' · ') || 'No roster yet'}</div></div>`).join('') || '<div class="empty">No teams registered</div>'}</div>`;
    } else if (tab === 'players') {
      const d = await api(`/t/${slug}/players`);
      c.innerHTML = `<div class="cards">${d.items.map((p) => `<div class="pcard"><div class="ign">${p.ign}</div><div class="meta">${p.currentTeam?.name || 'Free agent'}${p.role ? ' · ' + p.role : ''}</div></div>`).join('') || '<div class="empty">No players yet</div>'}</div>`;
    }
  } catch (e) { c.innerHTML = `<div class="card"><div class="empty">Could not load: ${e.message}</div></div>`; }
}

async function toggleMatch(row) {
  const next = row.nextElementSibling;
  if (next && next.classList.contains('detail')) { next.remove(); return; }
  document.querySelectorAll('tr.detail').forEach((x) => x.remove());
  const m = await api(`/t/${slug}/matches/${row.dataset.id}`);
  const tr = document.createElement('tr');
  tr.className = 'detail';
  tr.innerHTML = `<td colspan="5"><div class="inner"><h4>Match ${m.matchNumber} · ${m.map?.name || ''}</h4>
    <table><thead><tr><th>#</th><th class="l">Team</th><th>Elims</th><th>Place Pts</th><th>Total</th></tr></thead><tbody>
    ${m.teamStats.map((s) => `<tr><td class="rank">${s.placement}</td><td class="l">${teamCell(s.team)}</td><td>${s.kills}</td><td>${s.placementPoints}</td><td class="pts">${s.totalPoints}</td></tr>`).join('')}
    </tbody></table>
    ${m.playerStats.length ? `<h4 style="margin-top:14px">Player performance</h4><table><thead><tr><th class="l">Player</th><th class="l hide-sm">Team</th><th>Elims</th><th class="hide-sm">Damage</th><th>MVP</th></tr></thead><tbody>
    ${m.playerStats.slice(0, 12).map((p) => `<tr><td class="l"><b>${p.player.ign}</b></td><td class="l hide-sm">${p.team?.shortName || ''}</td><td>${p.kills}</td><td class="hide-sm">${Math.round(p.damage)}</td><td>${p.isMvp ? '★' : ''}</td></tr>`).join('')}
    </tbody></table>` : ''}
  </div></td>`;
  row.after(tr);
}

try {
  socket = io();
  socket.on('connect', () => { if (slug) socket.emit('join', slug); });
  socket.on('refresh', (p) => { if (p && p.slug === slug) render(); });
} catch (e) {}
boot();
</script>
</body>
</html>
